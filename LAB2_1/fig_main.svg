  <path class="line" d="M 550 985 L 550 1025" />
  <text class="label" x="568" y="1010">Yes</text>
  <path class="line" d="M 550 1085 L 550 1125" />
  <path class="line" d="M 700 1195 L 825 1195" />
  <text class="label" x="742" y="1180">No</text>
  <path class="line" d="M 550 1265 L 550 1315" />
  <text class="label" x="568" y="1290">Yes</text>
  <path class="line" d="M 690 1345 L 760 1345 L 760 935 L 640 935" />
  <path class="line" d="M 460 935 L 300 935 L 300 1480 L 330 1480" />
  <text class="label" x="775" y="1325">loop</text>
  <text class="label" x="268" y="915">No</text>
  <path class="line" d="M 550 1515 L 550 1560" />
  <path class="line" d="M 550 1660 L 550 1700" />
  <text class="label" x="568" y="1685">Yes</text>
  <path class="line" d="M 795 1735 L 855 1735 L 855 1610 L 640 1610" />
  <path class="line" d="M 460 1610 L 300 1610 L 300 1860 L 330 1860" />
  <text class="label" x="270" y="1590">No</text>
  <path class="line" d="M 550 1895 L 550 1940" />
