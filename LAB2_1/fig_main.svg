<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="2400" viewBox="0 0 1100 2400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
  </defs>
  <style>
    .shape { fill: #fff; stroke: #000; stroke-width: 2; }
    .line { fill: none; stroke: #000; stroke-width: 2; marker-end: url(#arrow); }
    .text { font-family: serif; font-size: 18px; fill: #000; }
    .small { font-size: 16px; }
    .label { font-family: serif; font-size: 16px; fill: #000; }
  </style>
  <rect width="100%" height="100%" fill="#fff" />

  <ellipse class="shape" cx="550" cy="60" rx="90" ry="30" />
  <text class="text" x="550" y="66" text-anchor="middle">Begin</text>

  <rect class="shape" x="355" y="120" width="390" height="70" />
  <text class="text small" x="550" y="162" text-anchor="middle">Declare constants, arrays and variables</text>

  <rect class="shape" x="355" y="235" width="390" height="70" />
  <text class="text small" x="550" y="265" text-anchor="middle">
    <tspan x="550" dy="0">Print task number</tspan>
    <tspan x="550" dy="20">Print count prompt</tspan>
  </text>

  <polygon class="shape" points="550,340 660,400 550,460 440,400" />
  <text class="text small" x="550" y="406" text-anchor="middle">std::cin &gt;&gt; n ?</text>

  <rect class="shape" x="820" y="370" width="200" height="70" />
  <text class="text small" x="920" y="400" text-anchor="middle">
    <tspan x="920" dy="0">Print Invalid count</tspan>
    <tspan x="920" dy="20">return 1</tspan>
  </text>

  <rect class="shape" x="395" y="500" width="310" height="60" />
  <text class="text small" x="550" y="536" text-anchor="middle">Ignore rest of input line</text>

  <polygon class="shape" points="550,600 700,670 550,740 400,670" />
  <text class="text small" x="550" y="660" text-anchor="middle">
    <tspan x="550" dy="0">0 &lt; n and</tspan>
    <tspan x="550" dy="20">n &lt;= MAX_STRINGS ?</tspan>
  </text>

  <rect class="shape" x="455" y="790" width="190" height="55" />
  <text class="text small" x="550" y="824" text-anchor="middle">i = -1</text>

  <polygon class="shape" points="550,885 640,935 550,985 460,935" />
  <text class="text small" x="550" y="941" text-anchor="middle">++i &lt; n ?</text>

  <rect class="shape" x="340" y="1025" width="420" height="60" />
  <text class="text small" x="550" y="1061" text-anchor="middle">Print prompt for string i + 1</text>

  <polygon class="shape" points="550,1125 700,1195 550,1265 400,1195" />
  <text class="text small" x="550" y="1185" text-anchor="middle">
    <tspan x="550" dy="0">getline(c_arr[i],</tspan>
    <tspan x="550" dy="20">MAX_LEN) ?</tspan>
  </text>

  <rect class="shape" x="825" y="1160" width="190" height="70" />
  <text class="text small" x="920" y="1190" text-anchor="middle">
    <tspan x="920" dy="0">Print Invalid input</tspan>
    <tspan x="920" dy="20">return 1</tspan>
  </text>

  <rect class="shape" x="410" y="1315" width="280" height="60" />
  <text class="text small" x="550" y="1351" text-anchor="middle">s_arr[i] = c_arr[i]</text>

  <rect class="shape" x="330" y="1445" width="440" height="70" />
  <text class="text small" x="550" y="1475" text-anchor="middle">
    <tspan x="550" dy="0">Print c-string results header</tspan>
    <tspan x="550" dy="20">i = -1</tspan>
  </text>

  <polygon class="shape" points="550,1560 640,1610 550,1660 460,1610" />
  <text class="text small" x="550" y="1616" text-anchor="middle">++i &lt; n ?</text>

  <rect class="shape" x="305" y="1700" width="490" height="70" />
  <text class="text small" x="550" y="1730" text-anchor="middle">
    <tspan x="550" dy="0">shortestWord(c_arr[i], result_c)</tspan>
    <tspan x="550" dy="20">Print c-string result</tspan>
  </text>

  <rect class="shape" x="330" y="1825" width="440" height="70" />
  <text class="text small" x="550" y="1855" text-anchor="middle">
    <tspan x="550" dy="0">Print string results header</tspan>
    <tspan x="550" dy="20">i = -1</tspan>
  </text>

  <polygon class="shape" points="550,1940 640,1990 550,2040 460,1990" />
  <text class="text small" x="550" y="1996" text-anchor="middle">++i &lt; n ?</text>

  <rect class="shape" x="315" y="2080" width="470" height="70" />
  <text class="text small" x="550" y="2110" text-anchor="middle">
    <tspan x="550" dy="0">shortestWord(s_arr[i], result_s)</tspan>
    <tspan x="550" dy="20">Print string result</tspan>
  </text>

  <rect class="shape" x="470" y="2205" width="160" height="50" />
  <text class="text small" x="550" y="2238" text-anchor="middle">return 0</text>

  <ellipse class="shape" cx="550" cy="2345" rx="90" ry="30" />
  <text class="text" x="550" y="2351" text-anchor="middle">End</text>

  <path class="line" d="M 550 90 L 550 120" />
  <path class="line" d="M 550 190 L 550 235" />
  <path class="line" d="M 550 305 L 550 340" />
  <path class="line" d="M 660 400 L 820 400" />
  <text class="label" x="725" y="385">No</text>
  <path class="line" d="M 550 460 L 550 500" />
  <text class="label" x="568" y="485">Yes</text>
