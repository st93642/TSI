  <text class="label" x="568" y="2065">Yes</text>
  <path class="line" d="M 785 2115 L 845 2115 L 845 1990 L 640 1990" />
  <path class="line" d="M 460 1990 L 550 1990 L 550 2205" />
  <text class="label" x="430" y="1970">No</text>
  <path class="line" d="M 550 2255 L 550 2315" />
  <path class="line" d="M 920 440 L 920 2315 L 640 2315" />
  <path class="line" d="M 920 1230 L 920 2315" />
</svg>