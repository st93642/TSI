<svg xmlns="http://www.w3.org/2000/svg" width="840" height="1270" viewBox="0 0 840 1270">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#000"/>
    </marker>
    <style>
      .shape { fill: #fff; stroke: #000; stroke-width: 2; }
      .line { fill: none; stroke: #000; stroke-width: 2; marker-end: url(#arrow); }
      .label { font-family: 'Times New Roman', serif; font-size: 18px; text-anchor: middle; }
      .small { font-family: 'Times New Roman', serif; font-size: 16px; }
    </style>
  </defs>

  <ellipse class="shape" cx="420" cy="45" rx="90" ry="25"/>
  <text class="label" x="420" y="51">Begin</text>

  <rect class="shape" x="220" y="105" width="400" height="95"/>
  <text class="label" x="420" y="135">best_start = 0; best_len = 0;</text>
  <text class="label" x="420" y="160">len = str.length(); i = 0;</text>
  <text class="label" x="420" y="185">found = false;</text>

  <polygon class="shape" points="420,235 540,290 420,345 300,290"/>
  <text class="label" x="420" y="285">i &lt; len ?</text>

  <rect class="shape" x="245" y="395" width="350" height="70"/>
  <text class="label" x="420" y="425">Skip spaces</text>
  <text class="label" x="420" y="450">while (i &lt; len &amp;&amp; str[i] == ' ')</text>

  <polygon class="shape" points="420,505 545,560 420,615 295,560"/>
  <text class="label" x="420" y="555">i &gt;= len ?</text>
  <text class="label" x="420" y="578">end reached</text>

  <rect class="shape" x="205" y="665" width="430" height="95"/>
  <text class="label" x="420" y="695">word_start = i</text>
  <text class="label" x="420" y="720">move i until space or len</text>
  <text class="label" x="420" y="745">word_len = i - word_start</text>

  <polygon class="shape" points="420,800 565,865 420,930 275,865"/>
  <text class="label" x="420" y="860">!found || word_len &lt; best_len ?</text>

  <rect class="shape" x="270" y="970" width="300" height="65"/>
  <text class="label" x="420" y="1000">Save best_start, best_len,</text>
  <text class="label" x="420" y="1025">found = true</text>

  <rect class="shape" x="190" y="1085" width="460" height="70"/>
  <text class="label" x="420" y="1115">If found, result = str.substr(...)</text>
  <text class="label" x="420" y="1140">Else result = empty string</text>

  <path class="line" d="M420 70 L420 105"/>
  <path class="line" d="M420 200 L420 235"/>
  <path class="line" d="M420 345 L420 395"/>
  <path class="line" d="M420 465 L420 505"/>
  <path class="line" d="M420 615 L420 665"/>
  <path class="line" d="M420 760 L420 800"/>
  <path class="line" d="M420 930 L420 970"/>

  <path class="line" d="M540 290 L715 290 L715 1085 L650 1085"/>
  <text class="small" x="663" y="275">No</text>

  <path class="line" d="M545 560 L690 560 L690 1085 L650 1085"/>
  <text class="small" x="645" y="545">Yes</text>

  <path class="line" d="M565 865 L720 865 L720 290 L540 290"/>
  <text class="small" x="648" y="850">No</text>

  <path class="line" d="M420 1035 L420 1060 L120 1060 L120 290 L300 290"/>
  <text class="small" x="138" y="1042">Yes</text>

  <path class="line" d="M420 1155 L420 1200"/>
  <ellipse class="shape" cx="420" cy="1225" rx="90" ry="25"/>
  <text class="label" x="420" y="1231">End</text>

  <text class="small" x="438" y="378">Yes</text>
  <text class="small" x="438" y="648">No</text>
</svg>
