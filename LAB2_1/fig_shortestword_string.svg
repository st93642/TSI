<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1450" viewBox="0 0 900 1450">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
  </defs>
  <style>
    .shape { fill: #fff; stroke: #000; stroke-width: 2; }
    .line { fill: none; stroke: #000; stroke-width: 2; marker-end: url(#arrow); }
    .text { font-family: serif; font-size: 18px; fill: #000; }
    .small { font-size: 16px; }
    .label { font-family: serif; font-size: 16px; fill: #000; }
  </style>
  <rect width="100%" height="100%" fill="#fff" />

  <ellipse class="shape" cx="450" cy="60" rx="90" ry="30" />
  <text class="text" x="450" y="66" text-anchor="middle">Begin</text>

  <rect class="shape" x="245" y="120" width="410" height="95" />
  <text class="text small" x="450" y="148" text-anchor="middle">
    <tspan x="450" dy="0">best_start = 0</tspan>
    <tspan x="450" dy="20">best_len = 0</tspan>
    <tspan x="450" dy="20">len = str.length()</tspan>
    <tspan x="450" dy="20">i = 0, found = false</tspan>
  </text>

  <polygon class="shape" points="450,250 550,300 450,350 350,300" />
  <text class="text small" x="450" y="306" text-anchor="middle">i &lt; len ?</text>

  <rect class="shape" x="235" y="405" width="430" height="70" />
  <text class="text small" x="450" y="435" text-anchor="middle">
    <tspan x="450" dy="0">Skip spaces while</tspan>
    <tspan x="450" dy="20">i &lt; len and str[i] == ' '</tspan>
  </text>

  <polygon class="shape" points="450,505 540,555 450,605 360,555" />
  <text class="text small" x="450" y="561" text-anchor="middle">i &gt;= len ?</text>

  <rect class="shape" x="210" y="645" width="480" height="90" />
  <text class="text small" x="450" y="673" text-anchor="middle">
    <tspan x="450" dy="0">word_start = i</tspan>
    <tspan x="450" dy="20">move i until space or len</tspan>
    <tspan x="450" dy="20">word_len = i - word_start</tspan>
  </text>

  <polygon class="shape" points="450,765 595,825 450,885 305,825" />
  <text class="text small" x="450" y="815" text-anchor="middle">
    <tspan x="450" dy="0">!found ||</tspan>
    <tspan x="450" dy="20">word_len &lt; best_len ?</tspan>
  </text>

  <rect class="shape" x="275" y="930" width="350" height="90" />
  <text class="text small" x="450" y="958" text-anchor="middle">
    <tspan x="450" dy="0">best_start = word_start</tspan>
    <tspan x="450" dy="20">best_len = word_len</tspan>
    <tspan x="450" dy="20">found = true</tspan>
  </text>

  <polygon class="shape" points="450,1050 540,1100 450,1150 360,1100" />
  <text class="text small" x="450" y="1106" text-anchor="middle">found ?</text>

  <rect class="shape" x="85" y="1200" width="310" height="80" />
  <text class="text small" x="240" y="1230" text-anchor="middle">
    <tspan x="240" dy="0">result = str.substr</tspan>
    <tspan x="240" dy="20">(best_start, best_len)</tspan>
  </text>

  <rect class="shape" x="505" y="1210" width="310" height="60" />
  <text class="text small" x="660" y="1246" text-anchor="middle">result = empty string</text>

  <ellipse class="shape" cx="450" cy="1410" rx="90" ry="30" />
  <text class="text" x="450" y="1416" text-anchor="middle">End</text>

  <path class="line" d="M 450 90 L 450 120" />
  <path class="line" d="M 450 215 L 450 250" />
  <path class="line" d="M 450 350 L 450 405" />
  <text class="label" x="468" y="382">Yes</text>
  <path class="line" d="M 450 475 L 450 505" />
  <path class="line" d="M 450 605 L 450 645" />
  <text class="label" x="468" y="627">No</text>
  <path class="line" d="M 450 735 L 450 765" />
  <path class="line" d="M 450 885 L 450 930" />
  <text class="label" x="468" y="910">Yes</text>
  <path class="line" d="M 625 975 L 705 975 L 705 300 L 550 300" />
  <path class="line" d="M 305 825 L 145 825 L 145 300 L 350 300" />
  <text class="label" x="720" y="320">No</text>
  <text class="label" x="115" y="805">No</text>
  <path class="line" d="M 550 300 L 780 300 L 780 1100 L 540 1100" />
  <path class="line" d="M 540 555 L 730 555 L 730 1100 L 540 1100" />
  <text class="label" x="795" y="320">No</text>
  <text class="label" x="743" y="575">Yes</text>
  <path class="line" d="M 360 1100 L 240 1100 L 240 1200" />
  <path class="line" d="M 540 1100 L 660 1100 L 660 1210" />
  <text class="label" x="276" y="1085">Yes</text>
  <text class="label" x="620" y="1085">No</text>
  <path class="line" d="M 240 1280 L 240 1350 L 450 1350 L 450 1380" />
  <path class="line" d="M 660 1270 L 660 1350 L 450 1350 L 450 1380" />
</svg>