<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1450" viewBox="0 0 900 1450">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
    </marker>
  </defs>
  <style>
    .shape { fill: #fff; stroke: #000; stroke-width: 2; }
    .line { fill: none; stroke: #000; stroke-width: 2; marker-end: url(#arrow); }
    .text { font-family: serif; font-size: 18px; fill: #000; }
    .small { font-size: 16px; }
    .label { font-family: serif; font-size: 16px; fill: #000; }
  </style>
  <rect width="100%" height="100%" fill="#fff" />

  <ellipse class="shape" cx="450" cy="60" rx="90" ry="30" />
  <text class="text" x="450" y="66" text-anchor="middle">Begin</text>

  <rect class="shape" x="260" y="120" width="380" height="90" />
  <text class="text small" x="450" y="150" text-anchor="middle">
    <tspan x="450" dy="0">best_start = 0</tspan>
    <tspan x="450" dy="20">best_len = 0</tspan>
    <tspan x="450" dy="20">i = 0, found = false</tspan>
  </text>

  <polygon class="shape" points="450,240 550,290 450,340 350,290" />
  <text class="text small" x="450" y="296" text-anchor="middle">str[i] ?</text>

  <rect class="shape" x="250" y="390" width="400" height="70" />
  <text class="text small" x="450" y="420" text-anchor="middle">
    <tspan x="450" dy="0">Skip spaces while</tspan>
    <tspan x="450" dy="20">str[i] == ' '</tspan>
  </text>

  <polygon class="shape" points="450,490 540,540 450,590 360,540" />
  <text class="text small" x="450" y="546" text-anchor="middle">!str[i] ?</text>

  <rect class="shape" x="220" y="630" width="460" height="90" />
  <text class="text small" x="450" y="658" text-anchor="middle">
    <tspan x="450" dy="0">word_start = i</tspan>
    <tspan x="450" dy="20">move i until space or 0</tspan>
    <tspan x="450" dy="20">len = i - word_start</tspan>
  </text>

  <polygon class="shape" points="450,750 590,810 450,870 310,810" />
  <text class="text small" x="450" y="800" text-anchor="middle">
    <tspan x="450" dy="0">!found ||</tspan>
    <tspan x="450" dy="20">len &lt; best_len ?</tspan>
  </text>

  <rect class="shape" x="290" y="915" width="320" height="90" />
  <text class="text small" x="450" y="943" text-anchor="middle">
    <tspan x="450" dy="0">best_start = word_start</tspan>
    <tspan x="450" dy="20">best_len = len</tspan>
    <tspan x="450" dy="20">found = true</tspan>
  </text>

  <polygon class="shape" points="450,1035 540,1085 450,1135 360,1085" />
  <text class="text small" x="450" y="1091" text-anchor="middle">found ?</text>

  <rect class="shape" x="90" y="1185" width="300" height="80" />
  <text class="text small" x="240" y="1215" text-anchor="middle">
    <tspan x="240" dy="0">Copy shortest word</tspan>
    <tspan x="240" dy="20">to result</tspan>
  </text>

  <rect class="shape" x="90" y="1305" width="300" height="60" />
  <text class="text small" x="240" y="1341" text-anchor="middle">result[best_len] = '\0'</text>

  <rect class="shape" x="510" y="1195" width="300" height="60" />
  <text class="text small" x="660" y="1231" text-anchor="middle">*result = '\0'</text>

  <ellipse class="shape" cx="450" cy="1410" rx="90" ry="30" />
  <text class="text" x="450" y="1416" text-anchor="middle">End</text>

  <path class="line" d="M 450 90 L 450 120" />
  <path class="line" d="M 450 210 L 450 240" />
  <path class="line" d="M 450 340 L 450 390" />
  <text class="label" x="468" y="370">Yes</text>
  <path class="line" d="M 450 460 L 450 490" />
  <path class="line" d="M 450 590 L 450 630" />
  <text class="label" x="468" y="612">No</text>
  <path class="line" d="M 450 720 L 450 750" />
  <path class="line" d="M 450 870 L 450 915" />
  <text class="label" x="468" y="895">Yes</text>
  <path class="line" d="M 610 960 L 690 960 L 690 290 L 550 290" />
  <path class="line" d="M 310 810 L 150 810 L 150 290 L 350 290" />
  <text class="label" x="705" y="310">No</text>
  <text class="label" x="120" y="790">No</text>
  <path class="line" d="M 550 290 L 770 290 L 770 1085 L 540 1085" />
  <path class="line" d="M 540 540 L 720 540 L 720 1085 L 540 1085" />
  <text class="label" x="786" y="310">No</text>
  <text class="label" x="734" y="560">Yes</text>
  <path class="line" d="M 360 1085 L 240 1085 L 240 1185" />
  <path class="line" d="M 540 1085 L 660 1085 L 660 1195" />
  <text class="label" x="275" y="1070">Yes</text>
  <text class="label" x="620" y="1070">No</text>
  <path class="line" d="M 240 1265 L 240 1305" />
  <path class="line" d="M 240 1365 L 240 1385 L 450 1385 L 450 1380" />
  <path class="line" d="M 660 1255 L 660 1350 L 450 1350 L 450 1380" />
</svg>